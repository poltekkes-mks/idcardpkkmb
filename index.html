<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Resmi Cek ID Card Peserta PKKMB Poltekkes Kemenkes Makassar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f4f8;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 100%; max-width: 500px;
            padding: 40px 30px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box; margin: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #1a365d; font-size: 24px; margin: 0 0 10px 0; }
        .header p { color: #64748b; font-size: 14px; margin: 0; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #334155; font-weight: 600; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 14px; font-family: 'Poppins', sans-serif;
            box-sizing: border-box; transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        .btn-submit {
            width: 100%; background-color: #2563eb; color: white; border: none;
            padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background-color 0.3s; font-family: 'Poppins', sans-serif;
        }
        .btn-submit:hover { background-color: #1d4ed8; }
        
        #areaHasil { display: none; margin-top: 30px; border-top: 2px dashed #e2e8f0; padding-top: 20px; }
        .data-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .data-list li { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .data-list li span { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .data-list li strong { color: #1e293b; font-size: 15px; }
        
        .btn-download {
            display: block; text-align: center; background-color: #10b981;
            color: white; text-decoration: none; padding: 12px;
            border-radius: 8px; font-weight: 600; transition: background-color 0.3s; margin-top:10px;
        }
        .btn-download:hover { background-color: #059669; }
        
        .btn-maps {
            display: inline-block; background-color: #f1f5f9; color: #2563eb;
            text-decoration: none; padding: 4px 8px; border-radius: 4px;
            font-size: 12px; font-weight: 600; margin-top: 5px; border: 1px solid #cbd5e1;
        }
        .btn-maps:hover { background-color: #e2e8f0; }

        .pesan-error {
            color: #ef4444; font-size: 14px; text-align: center; margin-top: 15px;
            display: none; background-color: #fef2f2; padding: 10px;
            border-radius: 8px; border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Portal Data ID Card Peserta PKKMB Tahun 2026</h1>
            <p>Verifikasi Data dan Unduh ID Card Anda</p>
        </div>

        <div id="areaForm">
            <div class="form-group">
                <label for="idPeserta">ID Peserta</label>
                <input type="text" id="idPeserta" placeholder="Masukkan ID Peserta Nomor Ujian Anda">
            </div>
            
            <div class="form-group">
                <label for="emailAktif">E-Mail Aktif</label>
                <input type="email" id="emailAktif" placeholder="Masukkan E-Mail Aktif Anda">
            </div>

            <button class="btn-submit" id="tombolCari" onclick="validasiData()">Cek Data Saya</button>
            <div id="pesanError" class="pesan-error"></div>
        </div>

        <div id="areaHasil">
            <h3 style="color: #1a365d; margin-top: 0; text-align: center;">Verifikasi Berhasil!</h3>
            
            <ul class="data-list">
                <li><span>Nama Lengkap:</span> <strong id="outNama"></strong></li>
                <li><span>Asal Institusi / Sekolah:</span> <strong id="outSekolah"></strong></li>
                <li><span>Jurusan Diterima:</span> <strong id="outJurusan"></strong></li>
                <li><span>Prodi Diterima:</span> <strong id="outProdi"></strong></li>
                <li><span>Pembagian Kelompok:</span> <strong id="outKelompok"></strong></li>
                <li>
                    <span>Lokasi PKKMB:</span> 
                    <strong id="outLokasi"></strong><br>
                    <a href="#" id="outMaps" class="btn-maps" target="_blank">📍 Buka Google Maps</a>
                </li>
            </ul>

            <a href="#" id="outLinkDownload" class="btn-download" target="_blank">📥 Lihat ID Card Saya</a>
            
            <button onclick="resetForm()" style="width: 100%; margin-top: 15px; padding: 10px; background: transparent; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; color: #64748b; font-family: 'Poppins', sans-serif;">Cek Peserta Lain</button>
        </div>
    </div>

    <script>
        // Link CSV Google Sheet Anda
        const linkSpreadsheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNfTreZTmWtdoqdBaV6PKBvdcVrb-UgGB6dmyzG6O8DK68F6TJbGUpd_5K03SqGBxUubtQbLSQL7gm/pub?gid=1136392083&single=true&output=csv";

        async function validasiData() {
            const inputID = document.getElementById("idPeserta").value.trim();
            const inputEmail = document.getElementById("emailAktif").value.trim().toLowerCase();
            const pesanError = document.getElementById("pesanError");
            const tombolCari = document.getElementById("tombolCari");

            if (inputID === "" || inputEmail === "") {
                tampilkanError("Harap isi ID Peserta dan E-Mail Anda.");
                return;
            }

            tombolCari.innerHTML = "Memverifikasi...";
            tombolCari.disabled = true;
            pesanError.style.display = "none";

            try {
                const respon = await fetch(linkSpreadsheet);
                const teksData = await respon.text();
                
                const baris = teksData.split('\n');
                let dataDitemukan = false;

                for (let i = 1; i < baris.length; i++) {
                    let kolom = baris[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                    if (kolom.length >= 20) {
                        let dataID = kolom[0].replace(/^"|"$/g, '').trim();
                        let dataEmail = kolom[1].replace(/^"|"$/g, '').trim().toLowerCase();

                        if (dataID === inputID && dataEmail === inputEmail) {
                            document.getElementById("outNama").innerText = kolom[2].replace(/^"|"$/g, '').trim();
                            document.getElementById("outProdi").innerText = kolom[6].replace(/^"|"$/g, '').trim();
                            document.getElementById("outSekolah").innerText = kolom[9].replace(/^"|"$/g, '').trim();
                            document.getElementById("outJurusan").innerText = kolom[12].replace(/^"|"$/g, '').trim();
                            document.getElementById("outLokasi").innerText = kolom[13].replace(/^"|"$/g, '').trim();
                            document.getElementById("outKelompok").innerText = kolom[18].replace(/^"|"$/g, '').trim();
                            
                            let linkMaps = kolom[14].replace(/^"|"$/g, '').trim();
                            document.getElementById("outMaps").href = linkMaps;

                            let linkDownload = kolom[19].replace(/^"|"$/g, '').trim();
                            document.getElementById("outLinkDownload").href = linkDownload;

                            document.getElementById("areaForm").style.display = "none";
                            document.getElementById("areaHasil").style.display = "block";
                            
                            dataDitemukan = true;
                            break; 
                        }
                    }
                }

                if (!dataDitemukan) {
                    tampilkanError("Data Tidak Ditemukan. Pastikan ID dan E-mail Sudah Benar. Lihat ID Peserta Pada Kartu Ujian dan Masukkan E-Mail Yang Anda Input Pada Formulir Konfirmasi Kehadiran PKKMB");
                }

            } catch (error) {
                tampilkanError("Terjadi kesalahan jaringan. Silakan coba lagi.");
            } finally {
                tombolCari.innerHTML = "Cek Data Saya";
                tombolCari.disabled = false;
            }
        }

        function tampilkanError(pesan) {
            const pesanError = document.getElementById("pesanError");
            pesanError.innerText = pesan;
            pesanError.style.display = "block";
        }

        function resetForm() {
            document.getElementById("idPeserta").value = "";
            document.getElementById("emailAktif").value = "";
            document.getElementById("areaForm").style.display = "block";
            document.getElementById("areaHasil").style.display = "none";
            document.getElementById("pesanError").style.display = "none";
        }
    </script>

</body>
</html>
